<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cut Optimizer - SoftHunterPro</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #007bff; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        #results { margin-top: 20px; }
        canvas { border: 1px solid #000; display: block; margin: 20px auto; max-width: 100%; }
        @media print { .controls, h1, button { display: none !important; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Мастер раскроя</h1>
        <div class="controls">
            <input type="number" id="sheetW" value="2440" placeholder="Ширина листа">
            <input type="number" id="sheetH" value="1220" placeholder="Высота листа">
            <input type="number" id="kerf" value="4" placeholder="Пропил (мм)">
            <textarea id="partsInput" rows="5">Полка, 800, 400, 4, 1, 2</textarea>
            <button onclick="calculateCutting()">Рассчитать карту</button>
            <button onclick="window.print()" style="background-color: #28a745; margin-top: 10px;">Распечатать</button>
        </div>
        <div id="results"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
