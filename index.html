<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cut Optimizer - SoftHunterPro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Мастер раскроя листов</h1>
        
        <div class="controls">
            <div class="input-group">
                <h3>Размер листа и пропил (мм)</h3>
                <input type="number" id="sheetW" value="2440" placeholder="Ширина листа">
                <input type="number" id="sheetH" value="1220" placeholder="Высота листа">
                <input type="number" id="kerf" value="4" placeholder="Толщина пропила (мм)">
            </div>

            <div class="input-group">
                <h3>Детали (Имя, Ширина, Высота, Шт, Кромка Ширина, Кромка Высота)</h3>
                <p class="hint">Вводи через запятую. Кромка: 0 (нет), 1 (одна сторона), 2 (две стороны).</p>
                <textarea id="partsInput" rows="6">Полка, 800, 400, 4, 1, 2
Боковина, 1200, 500, 2, 2, 0
Дно, 800, 500, 1, 1, 1</textarea>
            </div>

            <button onclick="calculateCutting()">Рассчитать карту раскроя</button>
        </div>

        <div id="actionButtons" style="display: none; margin-bottom: 20px;">
            <button class="print-btn" onclick="window.print()">🖨 Распечатать чертеж (или сохранить в PDF)</button>
        </div>

        <div id="results"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
