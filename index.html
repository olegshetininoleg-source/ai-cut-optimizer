<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мастер раскроя PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #f0f2f5, #e8eaf0); padding: 20px; margin: 0; color: #1f2937; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        h1 { color: #1e40af; text-align: center; margin: 0 0 30px; font-size: 28px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .logo { font-size: 32px; }
        .inputs-row { display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 200px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #4b5563; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 17px; }
        input:focus, textarea:focus { border-color: #1e40af; box-shadow: 0 0 0 4px rgba(30,64,175,0.15); outline: none; }
        .parts-label { font-size: 14px; font-weight: 600; color: #4b5563; margin: 25px 0 8px 0; }
        textarea { min-height: 130px; resize: vertical; font-family: monospace; }
        .btn-group { display: flex; gap: 15px; margin: 25px 0; flex-wrap: wrap; }
        button { flex: 1; min-width: 180px; padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 17px; }
        .calc-btn { background: #1e40af; color: white; }
        .reset-btn { background: #64748b; color: white; }
        .print-btn { background: #10b981; color: white; }
        canvas { border: 5px solid #1e40af; border-radius: 16px; background: #f8fafc; display: block; margin: 20px auto; max-width: 100%; box-shadow: 0 10px 30px rgba(30,64,175,0.25); }
        .sheet-title { text-align: center; font-size: 18px; font-weight: 600; color: #1e40af; margin: 15px 0 8px 0; }
        .info { font-size: 14px; color: #64748b; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="logo">🛠️</span> Мастер раскроя PRO</h1>
        
        <div class="controls">
            <div class="inputs-row">
                <div class="input-group"><label>Ширина листа (мм)</label><input type="number" id="sheetW" value="2440"></div>
                <div class="input-group"><label>Высота листа (мм)</label><input type="number" id="sheetH" value="1220"></div>
                <div class="input-group"><label>Пропил (мм)</label><input type="number" id="kerf" value="4"></div>
            </div>

            <div class="parts-label">Детали (Название, Ш, В, Кол-во, Кромка_Ш, Кромка_В):</div>
            <textarea id="partsInput" rows="5">Полка, 800, 400, 4, 1, 2
Боковина, 1200, 300, 2, 2, 2</textarea>

            <div class="btn-group">
                <button id="calcBtn" class="calc-btn">Авто-раскрой + поворот</button>
                <button id="resetBtn" class="reset-btn">Сбросить позиции</button>
                <button class="print-btn" onclick="window.print()">Печать</button>
            </div>
        </div>

        <div id="results"></div>
        <div class="info">🖱️ Перетаскивай детали • Клик/тап по детали = поворот 90° • Кромка видна как зазор</div>
    </div>

    <script>
        let parts = [];
        let sheetW = 2440, sheetH = 1220, kerf = 4;
        let scale = 1;
        const offset = 50;

        const resultsDiv = document.getElementById('results');

        function calculateCutting() {
            sheetW = parseFloat(document.getElementById('sheetW').value) || 2440;
            sheetH = parseFloat(document.getElementById('sheetH').value) || 1220;
            kerf = parseFloat(document.getElementById('kerf').value) || 4;

            const input = document.getElementById('partsInput').value.trim();
            parts = [];

            input.split('\n').forEach((line, idx) => {
                if (!line.trim()) return;
                const t = line.split(',').map(x => x.trim());
                if (t.length < 4) return;

                const name = t[0] || "Деталь";
                const origW = parseFloat(t[1]);
                const origH = parseFloat(t[2]);
                const qty = parseInt(t[3]) || 1;
                const edgeW = t[4] ? parseFloat(t[4]) : 0;
                const edgeH = t[5] ? parseFloat(t[5]) : 0;

                if (origW > 0 && origH > 0) {
                    for (let i = 0; i < qty; i++) {
                        parts.push({
                            id: idx*100 + i,
                            name,
                            originalW: origW,
                            originalH: origH,
                            w: origW + edgeW*2,
                            h: origH + edgeH*2,
                            x: 0,
                            y: 0,
                            rotated: false,
                            sheet: 0
                        });
                    }
                }
            });

            if (parts.length === 0) return alert("Нет деталей!");

            autoPlaceWithMultipleSheets();
            renderAllSheets();
        }

        function autoPlaceWithMultipleSheets() {
            parts.sort((a,b) => (b.w * b.h) - (a.w * a.h));
            let currentSheet = 0;
            let x = 10, y = 10, rowMaxH = 0;

            for (let p of parts) {
                let pw = p.w;
                let ph = p.h;
                p.rotated = false;

                if (x + pw > sheetW - 20) {
                    if (p.h < p.w) {
                        p.rotated = true;
                        pw = p.h;
                        ph = p.w;
                    }
                }

                if (x + pw > sheetW - 20) {
                    x = 10;
                    y += rowMaxH + kerf;
                    rowMaxH = 0;
                }

                if (y + ph > sheetH - 20) {
                    currentSheet++;
                    x = 10;
                    y = 10;
                    rowMaxH = 0;
                }

                p.x = x;
                p.y = y;
                p.w = pw;
                p.h = ph;
                p.sheet = currentSheet;
                rowMaxH = Math.max(rowMaxH, ph);
                x += pw + kerf;
            }
        }

        function renderAllSheets() {
            resultsDiv.innerHTML = '';
            const maxSheet = Math.max(...parts.map(p => p.sheet));

            for (let s = 0; s <= maxSheet; s++) {
                const sheetParts = parts.filter(p => p.sheet === s);

                const title = document.createElement('div');
                title.className = 'sheet-title';
                title.textContent = `ЛИСТ ${s+1} — ${sheetW} × ${sheetH} мм`;
                resultsDiv.appendChild(title);

                const canvas = document.createElement('canvas');
                canvas.width = sheetW * 0.85 + offset * 2;
                canvas.height = sheetH * 0.85 + offset * 2 + 30;
                resultsDiv.appendChild(canvas);

                drawSheet(canvas, sheetParts, s);
            }
        }

        function drawSheet(canvas, sheetParts, sheetNum) {
            const ctx = canvas.getContext('2d');
            scale = Math.min( (canvas.width - offset*2) / sheetW , (canvas.height - offset*2 - 30) / sheetH );

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const drawW = sheetW * scale;
            const drawH = sheetH * scale;

            // Лист
            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(offset, offset, drawW, drawH);
            ctx.strokeStyle = '#1e40af';
            ctx.lineWidth = 10;
            ctx.strokeRect(offset, offset, drawW, drawH);

            // Размеры листа
            ctx.fillStyle = '#1e40af';
            ctx.font = '600 17px Inter';
            ctx.textAlign = 'center';
            ctx.fillText(`${sheetW} мм`, offset + drawW/2, offset - 15);
            ctx.save();
            ctx.rotate(-Math.PI/2);
            ctx.fillText(`${sheetH} мм`, -offset - drawH/2, offset - 20);
            ctx.restore();

            sheetParts.forEach(p => {
                const px = p.x * scale + offset;
                const py = p.y * scale + offset;
                const pw = p.w * scale;
                const ph = p.h * scale;

                // Деталь
                ctx.fillStyle = p.rotated ? '#fbbf24' : '#1e40af';
                ctx.fillRect(px + 3, py + 3, pw - 10, ph - 10);

                ctx.strokeStyle = '#111';
                ctx.lineWidth = 4;
                ctx.strokeRect(px + 3, py + 3, pw - 10, ph - 10);

                // Пропил (зазор)
                ctx.strokeStyle = 'rgba(255,255,255,0.85)';
                ctx.lineWidth = 3;
                ctx.strokeRect(px + 4, py + 4, pw - 12, ph - 12);

                // Размер чистый
                ctx.fillStyle = 'white';
                ctx.font = '700 15px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(`${Math.round(p.originalW)}×${Math.round(p.originalH)}`, px + pw/2, py + ph/2 + 6);

                // Название
                ctx.font = '600 13px Inter';
                let label = p.name.length > 12 ? p.name.substring(0,11)+'…' : p.name;
                if (p.rotated) label += ' ↻';
                ctx.fillText(label, px + pw/2, py + 22);
            });
        }

        function resetLayout() {
            if (parts.length > 0) {
                parts.forEach(p => p.sheet = 0);
                autoPlaceWithMultipleSheets();
                renderAllSheets();
            }
        }

        // Кнопки
        document.getElementById('calcBtn').addEventListener('click', calculateCutting);
        document.getElementById('resetBtn').addEventListener('click', resetLayout);

        console.log("✅ Мастер раскроя PRO v6 загружен");
    </script>
</body>
</html>
