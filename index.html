<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мастер раскроя PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #f0f2f5, #e8eaf0); padding: 20px; margin: 0; color: #1f2937; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        h1 { color: #1e40af; text-align: center; margin: 0 0 30px; font-size: 28px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .logo { font-size: 32px; }
        .inputs-row { display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 200px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #4b5563; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 17px; }
        input:focus, textarea:focus { border-color: #1e40af; box-shadow: 0 0 0 4px rgba(30,64,175,0.15); outline: none; }
        .parts-label { font-size: 14px; font-weight: 600; color: #4b5563; margin: 25px 0 8px 0; }
        textarea { min-height: 130px; resize: vertical; font-family: monospace; }
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        button { flex: 1; min-width: 180px; padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 17px; }
        .calc-btn { background: #1e40af; color: white; }
        .print-btn { background: #10b981; color: white; }
        canvas { border: 5px solid #1e40af; border-radius: 16px; background: #f8fafc; display: block; margin: 20px auto; max-width: 100%; box-shadow: 0 10px 30px rgba(30,64,175,0.25); }
        .sheet-title { text-align: center; font-size: 18px; font-weight: 600; color: #1e40af; margin: 20px 0 8px 0; }
        .info { font-size: 14px; color: #64748b; text-align: center; margin: 15px 0; }
        .stats { display: flex; gap: 20px; flex-wrap: wrap; margin: 15px 0; }
        .stat-card { background: #f8fafc; padding: 14px 20px; border-radius: 12px; flex: 1; min-width: 200px; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="logo">🛠️</span> Мастер раскроя PRO</h1>
        
        <div class="controls">
            <div class="inputs-row">
                <div class="input-group"><label>Ширина листа (мм)</label><input type="number" id="sheetW" value="2440"></div>
                <div class="input-group"><label>Высота листа (мм)</label><input type="number" id="sheetH" value="1220"></div>
                <div class="input-group"><label>Пропил (мм)</label><input type="number" id="kerf" value="4"></div>
            </div>

            <div class="parts-label">Детали (Название, Ш, В, Кол-во, Кромка_Ш, Кромка_В):</div>
            <textarea id="partsInput" rows="5">Полка, 800, 400, 4, 1, 2
Боковина, 1200, 300, 2, 2, 2</textarea>

            <div class="btn-group">
                <button class="calc-btn" onclick="calculateCutting()">Рассчитать карту</button>
                <button class="print-btn" onclick="window.print()">Печать схемы</button>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        function calculateCutting() {
            const sheetW = parseFloat(document.getElementById('sheetW').value) || 2440;
            const sheetH = parseFloat(document.getElementById('sheetH').value) || 1220;
            const kerf = parseFloat(document.getElementById('kerf').value) || 0;

            const input = document.getElementById('partsInput').value.trim();
            let parts = [];

            input.split('\n').forEach(line => {
                if (!line.trim()) return;
                const t = line.split(',').map(x => x.trim());
                if (t.length < 4) return;

                const name = t[0] || "Деталь";
                const origW = parseFloat(t[1]);
                const origH = parseFloat(t[2]);
                const qty = parseInt(t[3]) || 1;
                const edgeW = t[4] ? parseFloat(t[4]) : 0;
                const edgeH = t[5] ? parseFloat(t[5]) : 0;

                if (origW > 0 && origH > 0) {
                    for (let i = 0; i < qty; i++) {
                        parts.push({
                            name: name,
                            w: origW + edgeW * 2,
                            h: origH + edgeH * 2,
                            originalW: origW,
                            originalH: origH
                        });
                    }
                }
            });

            if (parts.length === 0) return alert("Нет деталей!");

            // === ПЛОТНЫЙ АЛГОРИТМ С НЕСКОЛЬКИМИ ЛИСТАМИ ===
            parts.sort((a, b) => (b.w * b.h) - (a.w * a.h));

            const sheets = [];
            let currentSheet = [];
            let x = 10, y = 10, rowMaxH = 0;

            for (let p of parts) {
                let pw = p.w;
                let ph = p.h;
                let rotated = false;

                // Пробуем повернуть, если так лучше влезет
                if (x + pw > sheetW - 20 && p.h < p.w) {
                    rotated = true;
                    pw = p.h;
                    ph = p.w;
                }

                if (x + pw > sheetW - 20) {
                    x = 10;
                    y += rowMaxH + kerf;
                    rowMaxH = 0;
                }

                if (y + ph > sheetH - 20) {
                    sheets.push(currentSheet);
                    currentSheet = [];
                    x = 10;
                    y = 10;
                    rowMaxH = 0;
                }

                currentSheet.push({ ...p, rotated, x: x, y: y });
                rowMaxH = Math.max(rowMaxH, ph);
                x += pw + kerf;
            }
            if (currentSheet.length > 0) sheets.push(currentSheet);

            // === ФОРМИРОВАНИЕ РЕЗУЛЬТАТА ===
            let html = `
                <h2 style="color:#1e40af;">✅ Раскрой готов</h2>
                <div style="display:flex; gap:20px; flex-wrap:wrap; margin:15px 0;">
                    <div style="background:#f8fafc; padding:15px 20px; border-radius:12px; flex:1;">
                        <strong>Листов использовано:</strong><br>
                        <span style="font-size:32px; color:#1e40af;">${sheets.length}</span>
                    </div>
                    <div style="background:#f8fafc; padding:15px 20px; border-radius:12px; flex:1;">
                        <strong>Общая длина кромки:</strong><br>
                        <span style="font-size:32px; color:#10b981;">${(sheets.length * (sheetW + sheetH) * 2 / 1000).toFixed(1)} метров</span>
                    </div>
                </div>
            `;

            sheets.forEach((sheetParts, i) => {
                html += `<div class="sheet-title">ЛИСТ ${i+1} — ${sheetW} × ${sheetH} мм</div>`;
                html += `<canvas id="canvas${i}" width="${sheetW*0.85 + 100}" height="${sheetH*0.85 + 100}"></canvas>`;
            });

            document.getElementById('results').innerHTML = html;

            // Рисуем каждый лист
            sheets.forEach((sheetParts, i) => {
                setTimeout(() => {
                    const canvas = document.getElementById(`canvas${i}`);
                    const ctx = canvas.getContext('2d');
                    const scale = Math.min((canvas.width - 100) / sheetW, (canvas.height - 100) / sheetH);

                    ctx.fillStyle = '#f8fafc';
                    ctx.fillRect(50, 50, sheetW*scale, sheetH*scale);
                    ctx.strokeStyle = '#1e40af';
                    ctx.lineWidth = 12;
                    ctx.strokeRect(50, 50, sheetW*scale, sheetH*scale);

                    // Размеры листа
                    ctx.fillStyle = '#1e40af';
                    ctx.font = '600 18px Inter';
                    ctx.textAlign = 'center';
                    ctx.fillText(`${sheetW} мм`, 50 + sheetW*scale/2, 35);
                    ctx.save();
                    ctx.rotate(-Math.PI/2);
                    ctx.fillText(`${sheetH} мм`, -50 - sheetH*scale/2, 35);
                    ctx.restore();

                    sheetParts.forEach(p => {
                        const px = p.x * scale + 50;
                        const py = p.y * scale + 50;
                        const pw = p.w * scale;
                        const ph = p.h * scale;

                        ctx.fillStyle = p.rotated ? '#fbbf24' : '#1e40af';
                        ctx.fillRect(px + 4, py + 4, pw - 12, ph - 12);

                        ctx.strokeStyle = '#111';
                        ctx.lineWidth = 5;
                        ctx.strokeRect(px + 4, py + 4, pw - 12, ph - 12);

                        // Пропил (кромка)
                        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(px + 7, py + 7, pw - 18, ph - 18);

                        // Размер
                        ctx.fillStyle = 'white';
                        ctx.font = '700 15px Inter';
                        ctx.textAlign = 'center';
                        ctx.fillText(`${Math.round(p.originalW)}×${Math.round(p.originalH)}`, px + pw/2, py + ph/2 + 6);

                        // Название
                        ctx.font = '600 13px Inter';
                        let label = p.name.length > 12 ? p.name.substring(0,11)+'…' : p.name;
                        if (p.rotated) label += ' ↻';
                        ctx.fillText(label, px + pw/2, py + 24);
                    });
                }, i * 30);
            });
        }

        window.calculateCutting = calculateCutting;
    </script>
</body>
</html>
