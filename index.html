<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cut Optimizer - SoftHunterPro</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 25px; }
        label { font-size: 0.9em; color: #666; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0 20px 0; box-sizing: border-box; border: 2px solid #dfe1e5; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        input:focus, textarea:focus { border-color: #1a73e8; outline: none; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: transform 0.1s, opacity 0.3s; }
        button:active { transform: scale(0.98); }
        .calc-btn { background-color: #1a73e8; color: white; }
        .print-btn { background-color: #34a853; color: white; }
        #results { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .error-msg { background-color: #fce8e6; color: #d93025; padding: 15px; border-radius: 8px; border: 1px solid #fad2cf; }
        canvas { border: 1px solid #bdc1c6; display: block; margin: 25px auto; max-width: 100%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        @media print { .controls, h1, button { display: none !important; } .container { box-shadow: none; width: 100%; max-width: none; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Мастер раскроя PRO</h1>
        
        <div class="controls">
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Ширина листа (мм)</label>
                    <input type="number" id="sheetW" value="2440">
                </div>
                <div style="flex: 1;">
                    <label>Высота листа (мм)</label>
                    <input type="number" id="sheetH" value="1220">
                </div>
                <div style="flex: 1;">
                    <label>Пропил (мм)</label>
                    <input type="number" id="kerf" value="4">
                </div>
            </div>

            <label>Детали (Название, Ш, В, Кол-во, Кромка_Ш, Кромка_В):</label>
            <textarea id="partsInput" rows="6" placeholder="Напр: Полка, 800, 400, 4, 1, 2">Полка, 800, 400, 4, 1, 2
Боковина, 1200, 300, 2, 2, 2</textarea>

            <div class="btn-group">
                <button class="calc-btn" onclick="calculateCutting()">Рассчитать карту</button>
                <button class="print-btn" onclick="window.print()">Печать схемы</button>
            </div>
        </div>

        <div id="results">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
