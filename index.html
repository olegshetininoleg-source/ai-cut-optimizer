<script>
// ==================== МАСТЕР РАСКРОЯ PRO ====================

function calculateCutting() {
    const sheetW = parseFloat(document.getElementById('sheetW').value);
    const sheetH = parseFloat(document.getElementById('sheetH').value);
    const kerf = parseFloat(document.getElementById('kerf').value) || 0;
    
    const partsInput = document.getElementById('partsInput').value.trim();
    
    if (!sheetW || !sheetH) {
        showError("Укажите размеры листа!");
        return;
    }
    
    const lines = partsInput.split('\n').filter(line => line.trim() !== '');
    const parts = [];
    
    for (let line of lines) {
        const tokens = line.split(',').map(t => t.trim());
        if (tokens.length < 4) continue;
        
        const name = tokens[0];
        const w = parseFloat(tokens[1]);
        const h = parseFloat(tokens[2]);
        const qty = parseInt(tokens[3]);
        const edgeW = tokens[4] ? parseInt(tokens[4]) : 0;
        const edgeH = tokens[5] ? parseInt(tokens[5]) : 0;
        
        if (w && h && qty) {
            parts.push({ name, w: w + edgeW*2, h: h + edgeH*2, qty });
        }
    }
    
    if (parts.length === 0) {
        showError("Не удалось разобрать список деталей!");
        return;
    }
    
    // Простой жадный алгоритм раскроя
    const resultHTML = generateCuttingLayout(sheetW, sheetH, kerf, parts);
    
    document.getElementById('results').innerHTML = resultHTML;
}

// Показ ошибки
function showError(msg) {
    document.getElementById('results').innerHTML = 
        `<div class="error-msg">${msg}</div>`;
}

// Основная функция генерации раскроя
function generateCuttingLayout(sheetW, sheetH, kerf, parts) {
    let html = `<h2>Результат раскроя</h2>`;
    let totalArea = 0;
    let usedArea = 0;
    
    html += `<p><strong>Лист:</strong> ${sheetW} × ${sheetH} мм</p>`;
    
    parts.forEach(part => {
        const area = part.w * part.h * part.qty;
        totalArea += area;
        html += `<p><strong>${part.name}</strong>: ${part.w}×${part.h} мм × ${part.qty} шт. (${area} мм²)</p>`;
    });
    
    // Очень простой алгоритм (однонаправленный)
    html += `<h3>Схема раскроя (упрощённая):</h3>`;
    html += `<canvas id="cuttingCanvas" width="800" height="500"></canvas>`;
    
    // Расчёт эффективности
    const sheetArea = sheetW * sheetH;
    const efficiency = Math.round((totalArea / (sheetArea * Math.ceil(totalArea / sheetArea))) * 100);
    
    html += `<p><strong>Примерная эффективность:</strong> ${efficiency}%</p>`;
    
    // Запускаем отрисовку на canvas после добавления в DOM
    setTimeout(() => drawCuttingPlan(sheetW, sheetH, kerf, parts), 100);
    
    return html;
}

// Отрисовка схемы на canvas
function drawCuttingPlan(sheetW, sheetH, kerf, parts) {
    const canvas = document.getElementById('cuttingCanvas');
    const ctx = canvas.getContext('2d');
    
    const scale = Math.min(780 / sheetW, 480 / sheetH);
    
    canvas.width = sheetW * scale + 20;
    canvas.height = sheetH * scale + 20;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Лист
    ctx.fillStyle = '#f8f9fa';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.fillRect(10, 10, sheetW*scale, sheetH*scale);
    ctx.strokeRect(10, 10, sheetW*scale, sheetH*scale);
    
    let x = 10;
    let y = 10;
    let colorIndex = 0;
    const colors = ['#4285f4', '#34a853', '#fbbc05', '#ea4335', '#9c27b0'];
    
    parts.forEach(part => {
        const partW = part.w * scale;
        const partH = part.h * scale;
        
        for (let i = 0; i < part.qty; i++) {
            if (x + partW > canvas.width - 10) {
                x = 10;
                y += partH + kerf*scale;
            }
            
            if (y + partH > canvas.height - 10) {
                // Новый "лист" (просто смещаем цвет)
                ctx.fillStyle = '#eeeeee';
                ctx.fillRect(10, 10, sheetW*scale, sheetH*scale);
                y = 10;
                x = 10;
            }
            
            ctx.fillStyle = colors[colorIndex % colors.length];
            ctx.fillRect(x, y, partW - 2, partH - 2);
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            ctx.strokeRect(x, y, partW - 2, partH - 2);
            
            // Подпись
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(part.name.substring(0,8), x + partW/2 - 1, y + partH/2 + 5);
            
            x += partW + kerf*scale;
        }
        colorIndex++;
    });
}
</script>
