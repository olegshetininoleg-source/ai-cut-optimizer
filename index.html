<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мастер раскроя PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #f0f2f5, #e8eaf0); padding: 20px; color: #1f2937; margin: 0; }
        .container { max-width: 1120px; margin: 0 auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        h1 { color: #1e40af; text-align: center; margin: 0 0 30px 0; font-size: 29px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .logo { font-size: 34px; }
        
        .inputs-row { display: flex; gap: 20px; margin-bottom: 25px; }
        .input-group { flex: 1; }
        label { display: block; font-size: 14px; font-weight: 600; color: #4b5563; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 17px; }
        input:focus, textarea:focus { border-color: #1e40af; box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.15); outline: none; }
        
        canvas { 
            border: 3px solid #1e40af; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(30, 64, 175, 0.15);
            background: #f8fafc;
            display: block;
            margin: 15px auto;
            max-width: 100%;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }
        
        .sheet-header { background: #1e40af; color: white; padding: 10px 18px; border-radius: 8px 8px 0 0; font-weight: 600; font-size: 18px; margin-top: 25px; }
        .manual-controls { margin: 12px 0 25px 0; padding: 12px; background: #f8fafc; border-radius: 12px; text-align: center; }
        button { padding: 10px 18px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-rotate { background: #f59e0b; color: white; }
        .btn-optimize { background: #10b981; color: white; }
        
        .info { font-size: 14px; color: #64748b; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="logo">🛠️</span> Мастер раскроя PRO v4.2 — Перетаскивание</h1>
        
        <div class="controls">
            <div class="inputs-row">
                <div class="input-group"><label>Ширина листа (мм)</label><input type="number" id="sheetW" value="2440"></div>
                <div class="input-group"><label>Высота листа (мм)</label><input type="number" id="sheetH" value="1220"></div>
                <div class="input-group"><label>Пропил (мм)</label><input type="number" id="kerf" value="4"></div>
            </div>

            <div class="parts-label">Детали (Название, Ш, В, Кол-во, Кромка_Ш, Кромка_В):</div>
            <textarea id="partsInput" rows="5">Полка, 800, 400, 4, 1, 2
Боковина, 1200, 300, 2, 2, 2</textarea>

            <div class="options">
                <label style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="allowRotate" checked> Разрешить поворот деталей на 90°
                </label>
            </div>

            <div class="btn-group">
                <button class="calc-btn" onclick="calculateCutting()">Рассчитать автоматически</button>
                <button class="print-btn" onclick="window.print()">Печать всех листов</button>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        let allSheets = [];
        let currentSheetW = 2440, currentSheetH = 1220, currentKerf = 4;
        let allowRotateGlobal = true;
        let draggedItem = null;
        let dragSheetIndex = -1;
        let scaleCache = 1;
        let offsetCache = 30;

        function calculateCutting() {
            currentSheetW = parseFloat(document.getElementById('sheetW').value) || 2440;
            currentSheetH = parseFloat(document.getElementById('sheetH').value) || 1220;
            currentKerf = parseFloat(document.getElementById('kerf').value) || 4;
            allowRotateGlobal = document.getElementById('allowRotate').checked;

            const input = document.getElementById('partsInput').value.trim();
            let parts = [];
            const lines = input.split('\n').filter(l => l.trim() !== '');

            lines.forEach((line, idx) => {
                const t = line.split(',').map(x => x.trim());
                if (t.length < 4) return;
                const netW = parseFloat(t[1]), netH = parseFloat(t[2]), qty = parseInt(t[3]);
                if (!netW || !netH || !qty) return;

                for (let i = 0; i < qty; i++) {
                    parts.push({
                        id: idx + '-' + i,
                        name: t[0] || "Деталь",
                        netW, netH,
                        cutW: netW + (parseFloat(t[4])||0)*2,
                        cutH: netH + (parseFloat(t[5])||0)*2,
                        edgeW: parseFloat(t[4])||0,
                        edgeH: parseFloat(t[5])||0,
                        x: 0, y: 0,
                        rotated: false,
                        edgeVertical: true,
                        edgeHorizontal: true
                    });
                }
            });

            if (parts.length === 0) return showError("Нет деталей");

            allSheets = packIntoSheets(parts);
            renderAllSheets();
        }

        function packIntoSheets(parts) {
            const sheets = [];
            let currentSheet = { items: [] };
            let x = 0, y = 0, rowH = 0;

            parts.forEach(item => {
                let w = item.cutW, h = item.cutH;
                if (x + w > currentSheetW) {
                    x = 0;
                    y += rowH + currentKerf;
                    rowH = 0;
                }
                if (y + h > currentSheetH) {
                    sheets.push(currentSheet);
                    currentSheet = { items: [] };
                    x = 0; y = 0; rowH = 0;
                }
                item.x = x;
                item.y = y;
                currentSheet.items.push(item);
                x += w + currentKerf;
                rowH = Math.max(rowH, h);
            });
            if (currentSheet.items.length) sheets.push(currentSheet);
            return sheets;
        }

        function renderAllSheets() {
            let html = `<h2>✅ Раскрой готов — ${allSheets.length} лист${allSheets.length > 1 ? 'ов' : ''}</h2>
                        <p class="info">🖱️ Клик по детали — поворот • Зажать и тащить — перемещение</p>`;

            allSheets.forEach((sheet, i) => {
                html += `
                    <div class="sheet-header">ЛИСТ ${i + 1}</div>
                    <canvas id="canvas-${i}" width="900" height="600"></canvas>
                    <div class="manual-controls">
                        <button onclick="resetSheet(${i})">Сбросить позиции листа</button>
                    </div>`;
            });

            document.getElementById('results').innerHTML = html;

            allSheets.forEach((sheet, i) => {
                const canvas = document.getElementById(`canvas-${i}`);
                setupCanvasEvents(canvas, i);
                drawSheet(i);
            });
        }

        function setupCanvasEvents(canvas, sheetIndex) {
            let isDragging = false;
            let offsetX, offsetY;

            canvas.addEventListener('mousedown', e => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = (e.clientX - rect.left - offsetCache) / scaleCache;
                const mouseY = (e.clientY - rect.top - offsetCache) / scaleCache;

                const sheet = allSheets[sheetIndex];
                for (let item of sheet.items) {
                    if (mouseX > item.x && mouseX < item.x + (item.rotated ? item.cutH : item.cutW) &&
                        mouseY > item.y && mouseY < item.y + (item.rotated ? item.cutW : item.cutH)) {
                        
                        draggedItem = item;
                        dragSheetIndex = sheetIndex;
                        isDragging = true;
                        offsetX = mouseX - item.x;
                        offsetY = mouseY - item.y;
                        canvas.style.cursor = 'grabbing';
                        return;
                    }
                }
            });

            canvas.addEventListener('mousemove', e => {
                if (!isDragging || !draggedItem) return;
                const rect = canvas.getBoundingClientRect();
                let newX = (e.clientX - rect.left - offsetCache) / scaleCache - offsetX;
                let newY = (e.clientY - rect.top - offsetCache) / scaleCache - offsetY;

                const w = draggedItem.rotated ? draggedItem.cutH : draggedItem.cutW;
                const h = draggedItem.rotated ? draggedItem.cutW : draggedItem.cutH;

                // Ограничения границ
                newX = Math.max(0, Math.min(newX, currentSheetW - w));
                newY = Math.max(0, Math.min(newY, currentSheetH - h));

                draggedItem.x = Math.round(newX / 10) * 10; // прилипание к сетке 10 мм
                draggedItem.y = Math.round(newY / 10) * 10;

                drawSheet(dragSheetIndex);
            });

            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    draggedItem = null;
                    dragSheetIndex = -1;
                }
            });
        }

        function drawSheet(sheetIndex) {
            const canvas = document.getElementById(`canvas-${sheetIndex}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const sheet = allSheets[sheetIndex];
            
            const scale = Math.min(840 / currentSheetW, 560 / currentSheetH);
            scaleCache = scale;
            offsetCache = 30;

            canvas.width = currentSheetW * scale + offsetCache * 2;
            canvas.height = currentSheetH * scale + offsetCache * 2 + 60;

            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(offsetCache, offsetCache, currentSheetW*scale, currentSheetH*scale);
            ctx.strokeStyle = '#1e40af';
            ctx.lineWidth = 10;
            ctx.strokeRect(offsetCache, offsetCache, currentSheetW*scale, currentSheetH*scale);

            ctx.fillStyle = '#1e40af';
            ctx.font = '600 22px Inter';
            ctx.textAlign = 'center';
            ctx.fillText(`ЛИСТ ${sheetIndex + 1}`, canvas.width/2, 25);

            const colors = ['#1e40af', '#10b981', '#f59e0b', '#ef4444'];

            sheet.items.forEach((item, idx) => {
                const w = item.rotated ? item.cutH : item.cutW;
                const h = item.rotated ? item.cutW : item.cutH;
                const px = offsetCache + item.x * scale;
                const py = offsetCache + item.y * scale;
                const pw = w * scale;
                const ph = h * scale;

                ctx.fillStyle = item.rotated ? '#fbbf24' : colors[idx % colors.length];
                ctx.fillRect(px, py, pw - 6, ph - 6);
                ctx.strokeStyle = '#1f2937';
                ctx.lineWidth = 4;
                ctx.strokeRect(px, py, pw - 6, ph - 6);

                // Кромка
                ctx.strokeStyle = '#ca8a04';
                ctx.lineWidth = 7;
                if (item.edgeVertical) {
                    ctx.beginPath();
                    ctx.moveTo(px+5, py+5); ctx.lineTo(px+5, py+ph-5);
                    ctx.moveTo(px+pw-11, py+5); ctx.lineTo(px+pw-11, py+ph-5);
                    ctx.stroke();
                }
                if (item.edgeHorizontal) {
                    ctx.beginPath();
                    ctx.moveTo(px+5, py+5); ctx.lineTo(px+pw-5, py+5);
                    ctx.moveTo(px+5, py+ph-11); ctx.lineTo(px+pw-5, py+ph-11);
                    ctx.stroke();
                }

                ctx.fillStyle = 'white';
                ctx.font = 'bold 15px Inter';
                ctx.fillText(item.rotated ? item.name + ' ↻' : item.name, px + pw/2, py + ph/2 - 6);
                ctx.font = '13px Inter';
                ctx.fillText(`${Math.round(item.netW)}×${Math.round(item.netH)}`, px + pw/2, py + ph/2 + 18);
            });
        }

        function resetSheet(sheetIndex) {
            if (confirm("Сбросить позиции всех деталей на этом листе?")) {
                allSheets[sheetIndex].items.forEach(item => { item.x = 0; item.y = 0; });
                drawSheet(sheetIndex);
            }
        }

        function showError(msg) {
            document.getElementById('results').innerHTML = `<div style="color:red; padding:20px; background:#fee2e2; border-radius:12px;">${msg}</div>`;
        }

        window.calculateCutting = calculateCutting;
    </script>
</body>
</html>
