<script>
// ==================== МАСТЕР РАСКРОЯ PRO v2 ====================

function calculateCutting() {
    const sheetW = parseFloat(document.getElementById('sheetW').value) || 0;
    const sheetH = parseFloat(document.getElementById('sheetH').value) || 0;
    const kerf = parseFloat(document.getElementById('kerf').value) || 0;

    const input = document.getElementById('partsInput').value.trim();

    if (sheetW <= 0 || sheetH <= 0) {
        showError("Укажите ширину и высоту листа!");
        return;
    }

    const lines = input.split('\n').filter(l => l.trim() !== '');
    const parts = [];

    for (let line of lines) {
        const tokens = line.split(',').map(t => t.trim());
        if (tokens.length < 4) continue;

        const name = tokens[0];
        const w = parseFloat(tokens[1]);
        const h = parseFloat(tokens[2]);
        const qty = parseInt(tokens[3]);
        const edgeW = tokens[4] ? parseFloat(tokens[4]) : 0;
        const edgeH = tokens[5] ? parseFloat(tokens[5]) : 0;

        if (w > 0 && h > 0 && qty > 0) {
            parts.push({
                name: name || "Деталь",
                w: w + edgeW * 2,
                h: h + edgeH * 2,
                qty: qty
            });
        }
    }

    if (parts.length === 0) {
        showError("Не найдено ни одной корректной детали!");
        return;
    }

    document.getElementById('results').innerHTML = `
        <h2>✅ Расчёт выполнен</h2>
        <p><strong>Лист:</strong> ${sheetW} × ${sheetH} мм, пропил ${kerf} мм</p>
        <canvas id="cuttingCanvas" width="820" height="520" style="max-width:100%; border:2px solid #ddd; border-radius:8px;"></canvas>
        <p><strong>Детали:</strong></p>
        <ul>${parts.map(p => `<li>${p.name} — ${p.w}×${p.h} мм × ${p.qty} шт.</li>`).join('')}</ul>
    `;

    // Рисуем схему через небольшую задержку
    setTimeout(() => {
        drawOnCanvas(sheetW, sheetH, kerf, parts);
    }, 50);
}

function showError(msg) {
    document.getElementById('results').innerHTML = `<div style="color:red; background:#ffe6e6; padding:15px; border-radius:8px;">${msg}</div>`;
}

function drawOnCanvas(sheetW, sheetH, kerf, parts) {
    const canvas = document.getElementById('cuttingCanvas');
    const ctx = canvas.getContext('2d');
    
    const scale = Math.min(800 / sheetW, 500 / sheetH);
    const offset = 10;

    canvas.width = sheetW * scale + offset * 2;
    canvas.height = sheetH * scale + offset * 2;

    // Фон листа
    ctx.fillStyle = '#f8f9fa';
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 4;
    ctx.fillRect(offset, offset, sheetW*scale, sheetH*scale);
    ctx.strokeRect(offset, offset, sheetW*scale, sheetH*scale);

    let x = offset;
    let y = offset;
    const colors = ['#1e88e5', '#43a047', '#f9a825', '#e53935', '#8e24aa'];

    parts.forEach((part, index) => {
        const pw = part.w * scale;
        const ph = part.h * scale;
        const color = colors[index % colors.length];

        for (let i = 0; i < part.qty; i++) {
            if (x + pw > sheetW*scale + offset - 5) {
                x = offset;
                y += ph + kerf * scale;
            }
            if (y + ph > sheetH*scale + offset - 5) {
                y = offset + (sheetH*scale * 0.6); // переход на "следующий лист"
                x = offset;
            }

            ctx.fillStyle = color;
            ctx.fillRect(x, y, pw - 3, ph - 3);
            ctx.strokeStyle = '#263238';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, pw - 3, ph - 3);

            // Название
            ctx.fillStyle = 'white';
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(part.name.substring(0, 10), x + pw/2, y + ph/2 + 5);

            x += pw + kerf * scale;
        }
    });
}

// Делаем функцию доступной глобально
window.calculateCutting = calculateCutting;
</script>
